pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { properties.load(it) }
        }
        def path = properties.getProperty("flutter.sdk") ?: System.env.FLUTTER_ROOT
        assert path != null, "Flutter SDK not found. Set flutter.sdk in local.properties or FLUTTER_ROOT env var"
        return path
    }()
    settings.ext.flutterSdkPath = flutterSdkPath

    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.4" apply false
    id "org.jetbrains.kotlin.android" version "1.9.23" apply false
}

include ":app"
