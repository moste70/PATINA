name: Build APK

on:
  push:
    branches:
      - claude/loving-gates-2iem26
      - claude/determined-tesla-88zhql
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        working-directory: app/android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> local.properties

      - name: Get dependencies
        working-directory: app
        run: flutter pub get

      - name: Generate launcher icons
        working-directory: app
        run: dart run flutter_launcher_icons

      - name: Generate code (Drift + Riverpod)
        working-directory: app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK (debug)
        working-directory: app
        run: flutter build apk --debug || true

      - name: Copy debug APK to Flutter output path
        working-directory: app
        run: |
          mkdir -p build/outputs/flutter-apk
          SRC="android/app/build/outputs/flutter-apk/app-debug.apk"
          if [ -f "$SRC" ]; then
            cp "$SRC" build/outputs/flutter-apk/app-debug.apk
            echo "debug APK copied OK"
          else
            echo "APK not at expected path, searching..."
            find . -name "app-debug.apk" -type f
            exit 1
          fi

      - name: Upload APK debug
        uses: actions/upload-artifact@v4
        with:
          name: patina-debug-${{ github.run_number }}
          path: app/build/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Build APK (release unsigned)
        working-directory: app
        run: flutter build apk --release || true

      - name: Copy release APK to Flutter output path
        working-directory: app
        run: |
          mkdir -p build/outputs/flutter-apk
          SRC="android/app/build/outputs/flutter-apk/app-release.apk"
          if [ -f "$SRC" ]; then
            cp "$SRC" build/outputs/flutter-apk/app-release.apk
            echo "release APK copied OK"
          else
            echo "APK not at expected path, searching..."
            find . -name "app-release.apk" -type f
            exit 1
          fi

      - name: Upload APK release
        uses: actions/upload-artifact@v4
        with:
          name: patina-release-${{ github.run_number }}
          path: app/build/outputs/flutter-apk/app-release.apk
          retention-days: 14
